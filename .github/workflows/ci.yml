name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build designsystem
        run: ./gradlew :designsystem:assembleRelease

      - name: Compile designsystem-rules (catches PSI/detekt-api drift)
        run: ./gradlew :designsystem-rules:compileKotlin

      - name: Build sample
        run: ./gradlew :sample:assembleDebug

      - name: Publish both modules to local Maven (smoke test)
        run: ./gradlew :designsystem:publishToMavenLocal :designsystem-rules:publishToMavenLocal -x test

      - name: Upload sample APK
        uses: actions/upload-artifact@v4
        with:
          name: wiom-ds-sample-debug.apk
          path: sample/build/outputs/apk/debug/sample-debug.apk
          if-no-files-found: error
          retention-days: 30
