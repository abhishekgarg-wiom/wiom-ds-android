name: "📖 Documentation issue"
description: Something in a README, MIGRATION guide, or CLAUDE.md is wrong, unclear, or missing.
labels: ["docs"]
body:
  - type: input
    id: file
    attributes:
      label: Which file / section?
      description: "e.g. MIGRATION.md § 4 — Mapping table"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What's wrong / missing?
      description: Paste the confusing part and say what would have helped.
    validations:
      required: true
